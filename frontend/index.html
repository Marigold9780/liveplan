<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LivePlan</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>LivePlan</h1>
            <p>日音 Live Market</p>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-item active" data-view="market" title="Live Market">
            <span aria-hidden="true">M</span>
            <span>Market</span>
          </button>
          <button class="nav-item" data-view="cart" title="我的关注">
            <span aria-hidden="true">C</span>
            <span>关注</span>
          </button>
          <button class="nav-item" data-view="planner" title="时间规划">
            <span aria-hidden="true">P</span>
            <span>规划</span>
          </button>
          <button class="nav-item" data-view="reminders" title="提醒">
            <span aria-hidden="true">!</span>
            <span>提醒</span>
          </button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">中文向 · 官方公开信息整理</p>
            <h2 id="viewTitle">Live Market</h2>
          </div>
          <div class="topbar-actions">
            <button class="icon-button" id="exportButton" title="导出关注数据" aria-label="导出关注数据">⇩</button>
            <button class="secondary-button" id="syncButton">同步 Market</button>
          </div>
        </header>

        <section class="view active" id="marketView">
          <div class="hero-panel">
            <div>
              <p class="eyebrow">Live Market</p>
              <h3>像逛商城一样浏览日音 Live</h3>
              <p>自动同步池会整理官方已公开且尚未演出的 Live。看中哪场，就点“关注”加入你的 cart，再进入时间、预算和行程规划。</p>
            </div>
            <div class="sync-card">
              <span>上次同步</span>
              <strong id="lastSyncText">2026-06-08</strong>
            </div>
          </div>

          <div class="toolbar">
            <label class="search-box">
              <span>⌕</span>
              <input id="marketSearchInput" type="search" placeholder="搜索乐队、城市、场馆、关键词" />
            </label>
            <select id="artistFilter" aria-label="乐队筛选">
              <option value="all">全部乐队</option>
            </select>
            <select id="monthFilter" aria-label="月份筛选">
              <option value="all">全部月份</option>
            </select>
          </div>

          <div class="source-note">
            <strong>信息原则</strong>
            <span>标题、艺人、场馆等容易误解的关键字段保留原文；摘要、票价说明、规划提示使用中文。</span>
          </div>

          <div class="live-list" id="marketList"></div>
        </section>

        <section class="view" id="cartView">
          <div class="stats-grid" id="cartStats"></div>
          <div class="live-list" id="cartList"></div>
        </section>

        <section class="view" id="plannerView">
          <div class="planner-board" id="plannerBoard"></div>
        </section>

        <section class="view" id="remindersView">
          <div class="reminder-list" id="reminderList"></div>
        </section>
      </main>
    </div>

    <dialog class="detail-modal" id="detailDialog">
      <article class="detail-card">
        <button class="icon-button close-button" id="closeDetailButton" type="button" title="关闭" aria-label="关闭">×</button>
        <div id="detailContent"></div>
      </article>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
